services:
  database:
    image: postgres:17-alpine
    container_name: ds-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - ds_postgres_data:/var/lib/postgresql/data

volumes:
  ds_postgres_data:
