<div class="w-full">
  <div
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave()"
    (drop)="onDrop($event)"
    (click)="onDropZoneClick($event)"
    [class.border-accent]="isDragging()"
    [class.bg-background]="isDragging()"
    [class.cursor-pointer]="!selectedFile()"
    class="border border-dashed border-border py-10 rounded-xl bg-background-subtle transition-colors hover:border-foreground-muted/40"
  >
    <input
      #fileInput
      type="file"
      (change)="onFileSelected($event)"
      accept=".csv, .xlsx, .xls"
      class="hidden"
    />

    <div class="flex flex-col items-center">
      <div class="p-2 border border-border rounded-lg bg-background mb-5">
        <app-icon
          [name]="selectedFile() ? 'FileText' : 'Upload'"
          [size]="20"
          class="text-foreground-muted"
        />
      </div>

      @if (!selectedFile()) {
        <span class="text-sm mb-2 text-center px-4">
          Drag and drop your file here, or click to
          <span class="text-accent underline">browse</span>
        </span>
        <span class="text-xs text-foreground-muted">CSV, XLSX, XLS</span>
      } @else {
        <span class="text-sm mb-1 font-medium text-foreground text-center px-4">
          {{ selectedFile()!.name }}
        </span>
        <span class="text-xs text-foreground-muted mb-1">
          {{ selectedFile()!.size | number: '1.0-0' }} bytes
        </span>
        <span
          (click)="$event.stopPropagation(); fileInput.click()"
          class="text-xs text-accent underline cursor-pointer"
        >
          Click to change file
        </span>

        <div class="flex items-center gap-5 mt-7" (click)="$event.stopPropagation()">
          <button
            type="button"
            (click)="discardFile()"
            [disabled]="isUploading()"
            class="text-sm text-foreground-muted hover:text-foreground cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed"
          >
            Discard
          </button>
          <button
            type="button"
            (click)="confirmUpload()"
            [disabled]="isUploading()"
            class="surface-dark inline-flex items-center gap-2 px-4 py-2 text-sm font-medium rounded-md bg-(--background) text-(--foreground) cursor-pointer disabled:opacity-70 disabled:cursor-not-allowed"
          >
            @if (isUploading()) {
              <app-icon name="Loader" [size]="15" class="animate-spin" />
              Uploading
            } @else {
              <app-icon name="Upload" [size]="15" />
              Upload File
            }
          </button>
        </div>
      }
    </div>
  </div>

  @if (errorMessage(); as message) {
    <div class="flex items-center gap-1.5 mt-2.5 px-1">
      <app-icon name="BadgeAlert" [size]="13" class="text-error shrink-0" />
      <span class="text-xs text-error">{{ message }}</span>
      <button
        (click)="errorMessage.set(null)"
        class="ml-auto text-foreground-muted hover:text-foreground cursor-pointer"
      >
        <app-icon name="X" [size]="12" />
      </button>
    </div>
  }
</div>
