<div class="w-full h-screen flex bg-background overflow-hidden">
  <dash-sidebar #sidebarRef class="lg:hidden block" />

  <div class="hidden lg:flex w-64 shrink-0 h-full">
    <dash-sidebar class="block w-full h-full" />
  </div>

  <div class="flex-1 flex flex-col min-w-0 bg-background-subtle overflow-hidden">
    <header
      class="lg:hidden flex items-center justify-between gap-3 px-4 h-14 border-b border-border shrink-0 bg-background"
    >
      <button
        (click)="sidebarRef.mobileOpen.set(true)"
        class="w-9 h-9 flex flex-col items-center justify-center gap-1.5 rounded-lg text-foreground cursor-pointer shrink-0"
        aria-label="Open navigation"
      >
        <span class="w-[18px] h-[2px] bg-current rounded-full"></span>
        <span class="w-[18px] h-[2px] bg-current rounded-full"></span>
      </button>

      <div class="flex items-center gap-2 min-w-0">
        <div class="w-8 h-8 flex items-center justify-center shrink-0">
          <svg-sitelogo [size]="20" />
        </div>
        <div class="flex flex-col min-w-0 leading-tight">
          <span class="text-sm font-medium text-foreground-muted truncate">DocSign Pro</span>
          <span class="text-xs text-foreground truncate">Workspace</span>
        </div>
      </div>
      <div class="w-10 h-10 shrink-0"></div>
    </header>

    <main class="flex-1 overflow-y-auto">
      <router-outlet />
    </main>
  </div>
</div>

@if (modalService.showNewProject()) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-[2px]"
    (click)="closeProjectModal()"
  >
    <div
      class="bg-background border border-border rounded-2xl w-full max-w-sm mx-4 p-6 shadow-xl"
      (click)="$event.stopPropagation()"
    >
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-[17px] font-medium text-foreground">New folder</h2>
        <button
          (click)="closeProjectModal()"
          class="w-7 h-7 flex items-center justify-center rounded-md text-foreground-muted hover:bg-hover-background transition-colors cursor-pointer"
        >
          <app-icon name="X" [size]="14" />
        </button>
      </div>

      <label
        class="block text-[11px] font-medium uppercase tracking-[0.07em] text-foreground-muted mb-1.5"
      >
        Folder name
      </label>

      <input
        type="text"
        placeholder="e.g. Client Agreements"
        [value]="newFolderName()"
        (input)="newFolderName.set($any($event.target).value); error.set(null)"
        (keydown.enter)="createFolder()"
        class="w-full px-3.5 py-2.5 text-[13.5px] text-foreground bg-background border rounded-lg outline-none placeholder:text-placeholder-text mb-1.5 transition-colors"
        [class.border-error]="error()"
        [class.border-border]="!error()"
        autofocus
      />

      @if (error()) {
        <p class="text-[11.5px] font-medium text-error min-h-5 mb-3">{{ error() }}</p>
      } @else {
        <div class="mb-4"></div>
      }

      <label
        class="block text-[11px] font-medium uppercase tracking-[0.07em] text-foreground-muted mb-2.5"
      >
        Folder colour
      </label>
      <div class="flex items-center gap-2.5 mb-5">
        @for (opt of colorOptions; track opt.label) {
          <button
            (click)="newFolderColor.set(opt.bg)"
            class="w-6 h-6 rounded-full transition-all cursor-pointer flex items-center justify-center"
            [style.background]="opt.stroke"
            [title]="opt.label"
          >
            @if (newFolderColor() === opt.bg) {
              <app-icon name="Check" [size]="12" [stroke]="3" class="text-white" />
            }
          </button>
        }
      </div>

      <div class="flex items-center gap-2">
        <button
          (click)="closeProjectModal()"
          class="flex-1 px-4 py-2.5 text-[13px] font-medium text-foreground-muted border border-border rounded-lg hover:bg-hover-background transition-colors cursor-pointer"
        >
          Cancel
        </button>
        <button
          (click)="createFolder()"
          [disabled]="!newFolderName().trim()"
          class="flex-1 px-4 py-2.5 text-[13px] font-medium text-white rounded-lg transition-all cursor-pointer bg-accent hover:bg-accent-bg-hover disabled:opacity-50 disabled:cursor-not-allowed"
        >
          Create
        </button>
      </div>
    </div>
  </div>
}

@if (modalService.showUploadDocument()) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-[2px] px-4"
    (click)="closeUploadModal()"
  >
    <div
      class="bg-background border border-border rounded-2xl w-full max-w-3xl p-5 sm:p-7 shadow-xl"
      (click)="$event.stopPropagation()"
    >
      <div class="flex items-start justify-between mb-6 sm:mb-9">
        <div class="flex items-start sm:items-center gap-3 sm:gap-5 flex-1 min-w-0 pr-3">
          <div class="border border-border p-2.5 sm:p-3 rounded-full shrink-0">
            <app-icon name="CloudUpload" [size]="25" />
          </div>
          <div class="flex flex-col items-left gap-1 min-w-0">
            <h2 class="text-lg font-medium text-foreground">Upload document</h2>
            <p class="text-sm text-foreground-muted line-clamp-2">
              Select and upload the document you want to sign.
            </p>
          </div>
        </div>
        <button
          (click)="closeUploadModal()"
          class="w-7 h-7 shrink-0 flex items-center justify-center rounded-md text-foreground-muted hover:bg-hover-background hover:text-foreground transition-colors cursor-pointer"
        >
          <app-icon name="X" [size]="15" />
        </button>
      </div>
      <dash-file-upload (uploadSuccess)="onUploadSuccess()" />
    </div>
  </div>
}
